<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프리미엄 로또 번호 생성기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="theme-toggle">
        <button id="theme-btn" aria-label="Toggle theme">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </div>
      <h1>Lotto 6/45</h1>
      <p>당신의 행운을 확인해보세요!</p>
    </header>
    
    <div id="numbers-container">
      <div class="placeholder">행운의 번호가 이곳에 나타납니다</div>
    </div>

    <div class="controls">
      <button id="generate-btn">번호 생성하기</button>
    </div>

    <hr class="divider">

    <section class="inquiry-section">
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/mlgprqjw" method="POST" id="inquiry-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" name="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea name="message" id="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </section>

    <hr class="divider">

    <section class="comments-section">
      <div id="disqus_thread"></div>
      <script>
          (function() { 
          var d = document, s = d.createElement('script');
          s.src = 'https://suho-4.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </div>
  <script src="main.js"></script>
</body>
</html>
